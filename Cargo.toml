[package]
name = "yaml-rs"
version = "0.1.1"
edition = "2024"
license = "Unlicense"
repository = "https://github.com/lava-sh/yaml-rs"

[lib]
name = "_yaml_rs"
crate-type = ["cdylib"]

[dependencies]
pyo3 = {
    version = "=0.28.3",
    features = [
        "num-bigint",
        "generate-import-lib",
        "jiff-02",
    ]
}
jiff = "=0.2.24"
itoa = "=1.0.18"
num-bigint = "=0.4.6"
rustc-hash = "=2.1.2"
memchr = {
    version = "=2.8.0",
    default-features = false,
}
encoding_rs = "=0.8.35"
simdutf8 = {
    version = "=0.1.5",
    features = ["aarch64_neon_prefetch"],
}
saphyr = {
    git = "https://github.com/bourumir-wyngs/saphyr",
    rev = "97c21fee9f7620e72f3fe3c0658708a719420cd6",
}
granit-parser = {
    git = "https://github.com/bourumir-wyngs/granit-parser",
    rev = "d5d48541248d43550284e9e23c0edca37a298dc3",
}
lexical-core = {
    git = "https://github.com/Alexhuszagh/rust-lexical",
    rev = "afb2efa651f42f63415a3bf3d51ced6143132b2b",
    default-features = false,
    features = [
        "radix",
        "parse-floats",
        "parse-integers",
    ]
}
mimalloc = {
    optional = true,
    version = "=0.1.50",
    features = [
        # mimalloc v3
        # See: https://github.com/microsoft/mimalloc/tree/dev3?tab=readme-ov-file#branches
        "override",
        "local_dynamic_tls",
    ]
}

[features]
default = []
mimalloc = ["dep:mimalloc"]

[profile.release]
opt-level = 3
lto = "fat"
panic = "abort"
strip = "symbols"
codegen-units = 1

[lints.rust]
warnings = "deny"

[lints.clippy]
perf = { level = "deny", priority = 1 }
style = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
complexity = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }

too_many_lines = "allow"
manual_let_else = "allow"
cast_possible_truncation = "allow"
option_if_let_else = "allow"
missing_const_for_fn = "allow"
