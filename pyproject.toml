[build-system]
requires = ["maturin == 1.13.1"]
build-backend = "maturin"

[tool.maturin]
python-source = "py-src"
module-name = "yaml_rs._yaml_rs"

[project]
name = "yaml-rs"
dynamic = ["version"]
requires-python = ">=3.10"
description = "A High-Performance YAML Parser for Python written in Rust"
readme = "README.md"
license = "Unlicense"
license-files = ["UNLICENSE"]
authors = [
    { name = "chirizxc", email = "chirizxc@proton.me" }
]
maintainers = [
    { name = "chirizxc", email = "chirizxc@proton.me" }
]
classifiers = [
    "Typing :: Typed",
    "Programming Language :: Rust",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: Implementation :: PyPy",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Software Development :: Libraries",
    "License :: OSI Approved :: The Unlicense (Unlicense)",
]

[dependency-groups]
typos = ["typos == 1.45.1"]
zizmor = ["zizmor == 1.24.1"]
rumdl = ["rumdl == 0.1.77"]
maturin = ["maturin == 1.13.1"]
ci = [
    "pytest == 9.0.3",
    "dirty-equals == 0.11",
    "ruff == 0.15.11",
    "pyyaml == 6.0.3",
    { include-group = "maturin" },
]
dev = [
    { include-group = "ci" },
    { include-group = "typos" },
    { include-group = "rumdl" },
    { include-group = "zizmor" },
]
bench = [
    "oyaml == 1.0",
    "pyyaml == 6.0.3",
    "ryaml == 0.5.1",
    "ruamel-yaml == 0.19.1",
    "ruamel.yaml.clibz == 0.3.7",
    ##################
    "polars == 1.40.0",
    "altair == 6.1.0.dev20260330 ",
    "py-cpuinfo == 9.0.0",
    "vl-convert-python == 1.9.0.post1",
]

[project.urls]
Source = "https://github.com/lava-sh/yaml-rs"
Homepage = "https://github.com/lava-sh/yaml-rs"
"Bug Tracker" = "https://github.com/lava-sh/yaml-rs/issues"