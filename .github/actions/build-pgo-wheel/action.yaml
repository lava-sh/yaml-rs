# https://github.com/pydantic/pydantic/blob/main/.github/actions/core-build-pgo-wheel/action.yml

name: "Build PGO wheel"
description: "Builds a PGO-optimized wheel"

inputs:
  target:
    description: "Rust target to build the wheel for"
    required: true

  interpreter:
    description: "Interpreter to build the wheel for"
    required: true

  rust-toolchain:
    description: "Rust toolchain to use"
    required: true

  maturin-build-args:
    description: "Additional arguments to pass to maturin build"
    required: false
    default: ""

  working-directory:
    description: "Working directory to run the action in"
    required: false
    default: "."

outputs:
  wheel:
    description: "Path to the built wheel"
    value: ${{ steps.find_wheel.outputs.path }}

runs:
  using: composite
  steps:
    - name: "Prepare profiling directory"
      shell: bash
      run: >-
        echo "📁 Creating profiling directory"
        mkdir -p ${{ github.workspace }}/profdata

    - name: "Install uv"
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: ${{ github.event_name == 'pull_request' }}

    - name: ""
      shell: bash
      run: >-
        echo "📊 Phase 1/4: Building instrumented wheel..."

    - name: "Build initial wheel"
      uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
      with:
        target: ${{ inputs.target }}
        rust-toolchain: ${{ inputs.rust-toolchain }}
        manylinux: auto
        working-directory: ${{ inputs.working-directory }}
        args: >-
          --release
          --out initial-wheel
          --interpreter ${{ inputs.interpreter }}
          ${{ inputs.maturin-build-args }}
          --compatibility pypi
        docker-options: >-
          -e CI
          -e RUSTFLAGS
      env:
        RUSTFLAGS: "-Cprofile-generate=${{ github.workspace }}/profdata"

    - name: ""
      shell: bash
      run: >-
        echo "🔬 Phase 2/4: Generate PGO data..."

    - name: "Generate pgo data"
      working-directory: ${{ inputs.working-directory }}
      run: python "$GITHUB_ACTION_PATH/pgo.py"
      shell: bash
      env:
        INPUTS_TARGET: ${{ inputs.target }}
        INPUTS_INTERPRETER: ${{ inputs.interpreter }}
        INPUTS_WORKING_DIRECTORY: ${{ inputs.working-directory }}

    - name: ""
      shell: bash
      run: >-
        echo "🧬 Phase 3/4: Merging profile data..."

    - name: "Merge pgo data"
      shell: pwsh
      env:
        LLVM_PROFDATA: ${{ env.LLVM_PROFDATA }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
      run: |
        & $env:LLVM_PROFDATA merge `
          -o "$env:GITHUB_WORKSPACE/merged.profdata" `
          "$env:GITHUB_WORKSPACE/profdata"

    - name: ""
      shell: bash
      run: >-
        echo "⚡ Phase 4/4: Building PGO-optimized wheel..."

    - name: ""
      uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
      with:
        working-directory: ${{ inputs.working-directory }}
        target: ${{ inputs.target }}
        manylinux: auto
        args: >-
          --release
          --out dist
          --interpreter ${{ inputs.interpreter }}
          ${{ inputs.maturin-build-args }}
          --compatibility pypi
        rust-toolchain: ${{ inputs.rust-toolchain }}
        docker-options: >-
          -e CI
          -e RUSTFLAGS
      env:
        RUSTFLAGS: "-Cprofile-use=${{ github.workspace }}/merged.profdata"

    - name: ""
      id: find_wheel
      working-directory: ${{ inputs.working-directory }}
      shell: bash
      run: |
        echo "📦 Found wheels:"
        for wheel in dist/*.whl; do
          echo "  • $(basename "$wheel")"
        done

        {
          echo "path<<EOF"
          printf '%s\n' dist/*.whl
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
