name: "Get lib version from git tag"
description: "Get lib version from git tag"

runs:
  using: "composite"
  steps:
    - name: "Set Cargo.toml version"
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      shell: bash
      env:
        RELEASE_VERSION: ${{ github.ref_name }}
      run: |
        VERSION="${RELEASE_VERSION}"

        CURRENT_VERSION="$(sed --quiet --regexp-extended 's/^version = "([^"]+)"/\1/p' Cargo.toml | head --lines=1)"

        echo "Current Cargo.toml version: ${CURRENT_VERSION}"
        echo "Version from git tag: ${VERSION}"

        sed \
          --in-place \
          --regexp-extended \
          "0,/^version = \"[^\"]+\"/s//version = \"${VERSION}\"/" \
          Cargo.toml
