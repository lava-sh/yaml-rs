name: "windows"

on:
  workflow_call:

env:
  UV_LINK_MODE: copy

jobs:
  windows:
    name: "${{ matrix.platform.runner }} / ${{ matrix.platform.target }}"
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - {
            # AMD64
            runner: windows-latest,
            target: x64,
            python-arch: x64,
            interpreter: "3.10 3.11 3.12 3.13 3.14 3.13t 3.14t pypy3.11",
            maturin-build-args: "--features mimalloc",
            use-pgo: true,
          }
          - {
            # x86
            runner: windows-latest,
            target: x86,
            python-arch: x86,
            interpreter: "3.10 3.11 3.12 3.13 3.14 3.13t 3.14t",
            maturin-build-args: "--features mimalloc",
            use-pgo: true,
          }
          - {
            # ARM64
            runner: windows-11-arm,
            target: aarch64,
            python-arch: arm64,
            interpreter: "3.10 3.11 3.12 3.13 3.14 3.13t 3.14t",
            maturin-build-args: "--features mimalloc",
            use-pgo: false,
          }

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Install uv"
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]

      - name: "Build wheels"
        if: matrix.platform.use-pgo == false
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
          args: >
            --release
            --out dist
            --interpreter ${{ matrix.platform.interpreter }}
            ${{ matrix.platform.maturin-build-args }}
            --compatibility pypi

      - name: "Install rust stable + llvm-tools"
        if: matrix.platform.use-pgo == true
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          components: llvm-tools
          toolchain: nightly

      - name: "Build PGO wheel"
        if: matrix.platform.use-pgo == true
        uses: ./.github/actions/build-pgo-wheel
        with:
          target: ${{ matrix.platform.target }}
          python-arch: ${{ matrix.platform.python-arch }}
          interpreter: ${{ matrix.platform.interpreter }}
          rust-toolchain: ${{ steps.rust-toolchain.outputs.name }}
          maturin-build-args: ${{ matrix.platform.maturin-build-args }}

      - name: "Upload wheels"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist
