name: "CI"

permissions: { }

on:
  push:
    branches:
      - main
    tags:
      - "*"
    paths-ignore:
      - "scripts/"
  pull_request:
    paths-ignore:
      - "scripts/"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  cargo-fmt:
    name: "cargo fmt (nightly)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Install Rust nightly + rustfmt"
        run: rustup toolchain install nightly --component rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: github.event_name == 'pull_request' && github.run_attempt == 1
        with:
          lookup-only: false # zizmor: ignore[cache-poisoning]

      - run: cargo fmt-nightly --check

  cargo-clippy:
    name: "cargo clippy (nightly)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Install Rust nightly + clippy"
        run: rustup toolchain install nightly --component clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: github.event_name == 'pull_request' && github.run_attempt == 1
        with:
          lookup-only: false # zizmor: ignore[cache-poisoning]

      - run: cargo clippy --all-targets

  tools:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: "zizmor"
            command: zizmor .github/

          - name: "typos"
            command: typos --config .typos.toml

          - name: "rumdl"
            command: rumdl check .

    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: "Install uv"
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # zizmor: ignore[cache-poisoning]
          enable-cache: ${{ github.event_name == 'pull_request' }}

      - name: "Install ${{ matrix.name }}"
        run: uv pip install --group ${{ matrix.name }} --system

      - name: "Run ${{ matrix.name }}"
        run: ${{ matrix.command }}

  tests:
    uses: ./.github/workflows/tests.yaml

  tests-alpine:
    name: "tests / alpine / python 3.14"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "latest"
        run: |
          mkdir -p /tmp/__build__
          cp -r py-src src Cargo.toml pyproject.toml README.md /tmp/__build__/

          docker run --rm \
            -v /tmp/__build__:/parser \
            -w /parser \
            ghcr.io/astral-sh/uv:python3.14-alpine sh -c "
              apk add --no-cache curl build-base musl-dev openssl-dev && \
              curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain nightly && \
              . \$HOME/.cargo/env && \
              rustc --version && \
              uv pip install maturin[patchelf] -U --system && \
              maturin build --release --out /parser/dist --features mimalloc && \
              uv pip install /parser/dist/*.whl --system && \
              python -c 'import yaml_rs; print(yaml_rs.__version__)'
          "

  linux:
    needs: [ tests, tests-alpine, cargo-fmt, cargo-clippy, tools ]
    uses: ./.github/workflows/linux.yaml

  musllinux:
    needs: [ tests, tests-alpine, cargo-fmt, cargo-clippy, tools ]
    uses: ./.github/workflows/musllinux.yaml

  windows:
    needs: [ tests, tests-alpine, cargo-fmt, cargo-clippy, tools ]
    uses: ./.github/workflows/windows.yaml

  macos:
    needs: [ tests, tests-alpine, cargo-fmt, cargo-clippy, tools ]
    uses: ./.github/workflows/macos.yaml

  wasm:
    needs: [ tests, tests-alpine, cargo-fmt, cargo-clippy, tools ]
    uses: ./.github/workflows/wasm.yaml

  build-sdist:
    name: "build-sdist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Build sdist"
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist
          rust-toolchain: nightly

      - name: "Upload sdist"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-sdist
          path: dist

  release:
    name: "Release"
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
    environment: pypi
    needs: [
      build-sdist,
      linux,
      musllinux,
      windows,
      macos,
      wasm,
    ]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: "Generate artifact attestation"
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "wheels-*/*"

      - name: "Install uv"
        if: ${{ github.ref_type == 'tag' }}
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: "Publish to PyPI"
        if: ${{ github.ref_type == 'tag' }}
        run: uv publish 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

      - name: "Upload wasm wheels to GitHub Release"
        if: ${{ github.ref_type == 'tag' }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release view "$tag" >/dev/null 2>&1 || \
          gh release create "$tag" --title "$tag" --notes ""
          gh release upload "$tag" wheels-wasm-*/*.whl --clobber
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
