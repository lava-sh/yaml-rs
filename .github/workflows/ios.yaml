name: "ios"

on:
  workflow_call:

jobs:
  ios:
    name: "ubuntu-latest / ${{ matrix.platform.target }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - {
            # ARM64 (iPhone/iPad)
            target: aarch64-apple-ios,
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            maturin_build_args: "--features mimalloc"
          }
          - {
            # x86_64 (Simulator)
            target: x86_64-apple-ios,
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            maturin_build_args: "--features mimalloc"
          }

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x

      - name: "Build wheels"
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          target: ${{ matrix.platform.target }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
          args: >
            --release
            --out dis
            --interpreter ${{ matrix.platform.interpreter }}
            ${{ matrix.platform.maturin_build_args }}
            --compatibility pypi
        env:
          IPHONEOS_DEPLOYMENT_TARGET: 15.0

      - name: "Upload wheels"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-ios-${{ matrix.platform.target }}
          path: dist