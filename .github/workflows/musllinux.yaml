name: "musllinux"

on:
  workflow_call:

jobs:
  musllinux:
    name: "ubuntu-latest / ${{ matrix.platform.target }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PyPI does not support Rust target `loongarch64-unknown-linux-gnu`
        # `s390x-unknown-linux-musl` is not available as prebuilt target for cross-compilation
        # `s390x` is only supported for manylinux (gnu), not musllinux
        platform:
          - {
            # AMD64
            target: x86_64,
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            maturin-build-args: "--features mimalloc"
          }
          - {
            # x86 (32-bit)
            target: x86,
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            maturin-build-args: "--features mimalloc"
          }
          - {
            # ARM64
            target: aarch64,
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            maturin-build-args: "--features mimalloc"
          }
          - {
            # ARMv7 (32-bit)
            target: armv7,
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            maturin-build-args: "--features mimalloc"
          }
          - {
            # PowerPC64 Little Endian
            target: ppc64le,
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            maturin-build-args: "--features mimalloc"
          }
          - {
            # RISC-V 64-bit
            target: riscv64,
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            maturin-build-args: "--features mimalloc"
          }

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Install uv"
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # zizmor: ignore[cache-poisoning]
          enable-cache: ${{ github.event_name == 'pull_request' }}

      - name: "Build wheels"
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          sccache: ${{ github.event_name == 'pull_request' }}
          manylinux: musllinux_1_2
          args: >
            --release
            --out dist
            --interpreter ${{ matrix.platform.interpreter }}
            ${{ matrix.platform.maturin-build-args }}
            --compatibility pypi

      - name: "Upload wheels"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist
