name: "musllinux"

on:
  workflow_call:

env:
  # A small hack to use anchors as GitHub doesn't allow it to be top level
  ○_○: &interpreters "3.10 3.11 3.12 3.13 3.14 3.14t 3.15 3.15t pypy3.11"

jobs:
  musllinux:
    name: "${{ matrix.platform.runner }} / ${{ matrix.platform.target }}"
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Rust target `loongarch64-unknown-linux-musl` is not supported by PyPI
        #
        # Rust targets `s390x-unknown-linux-musl`, `powerpc64-unknown-linux-musl`
        # is not available for cross-compilation (only supported for manylinux)
        platform:
          - {
            # AMD64
            runner: ubuntu-latest,
            target: x86_64-unknown-linux-musl,
            interpreter: *interpreters,
            maturin-build-args: "--features mimalloc"
          }
          - {
            # x86 (32-bit)
            runner: ubuntu-latest,
            target: i686-unknown-linux-musl,
            interpreter: *interpreters,
            maturin-build-args: "--features mimalloc"
          }
          - {
            # ARM64
            runner: ubuntu-26.04-arm,
            target: aarch64-unknown-linux-musl,
            interpreter: *interpreters,
            maturin-build-args: "--features mimalloc"
          }
          - {
            # ARMv7 (32-bit)
            runner: ubuntu-latest,
            target: armv7-unknown-linux-musleabihf,
            interpreter: *interpreters,
            maturin-build-args: "--features mimalloc"
          }
          - {
            # PowerPC64 Little Endian
            runner: ubuntu-latest,
            target: powerpc64le-unknown-linux-musl,
            interpreter: *interpreters,
            maturin-build-args: "--features mimalloc"
          }
          - {
            # RISC-V 64-bit
            runner: ubuntu-latest,
            target: riscv64gc-unknown-linux-musl,
            interpreter: *interpreters,
            maturin-build-args: "--features mimalloc"
          }

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: "Install uv"
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: ${{ github.event_name == 'pull_request' }}

      - name: "Build wheels"
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          sccache: ${{ github.event_name == 'pull_request' }}
          manylinux: musllinux_1_2
          args: >
            --release
            --out dist
            --interpreter ${{ matrix.platform.interpreter }}
            ${{ matrix.platform.maturin-build-args || '' }}
            --compatibility pypi

      - name: "Upload wheels"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist
